<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent Runner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

    :root {
      --bg: #f6f3ee;
      --panel: #fffdf7;
      --ink: #1b1b1f;
      --sub: #5d5a53;
      --line: #d8d2c8;
      --accent: #0f766e;
      --accent-2: #f97316;
      --ok: #166534;
      --warn: #b45309;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, #ffe6c7 0, transparent 35%),
        radial-gradient(circle at 0% 100%, #c4f1ec 0, transparent 42%),
        var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 1440px;
      margin: 24px auto 48px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .hero {
      background: linear-gradient(135deg, #1f2937, #0f766e);
      color: #f7fafc;
      border-radius: 16px;
      padding: 18px 18px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }
    .hero p { margin: 0; opacity: .9; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.04);
      min-width: 0;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    label {
      font-size: 13px;
      color: var(--sub);
      display: block;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }
    textarea { min-height: 120px; resize: vertical; }

    .row { display: grid; gap: 10px; margin-bottom: 10px; }
    .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--accent);
      transition: transform .12s ease, opacity .2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: #334155; }
    button.warn { background: var(--accent-2); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .status {
      display: inline-block;
      font-size: 12px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      margin-left: 6px;
    }
    .status.completed { color: var(--ok); border-color: #7dd3a7; background: #f0fdf4; }
    .status.interrupted { color: var(--warn); border-color: #fdba74; background: #fff7ed; }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.45;
      max-height: 290px;
      overflow: auto;
      max-width: 100%;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      margin: 10px 0 0;
    }

    details {
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--sub);
      font-size: 13px;
      user-select: none;
    }

    .kv-wrap {
      margin: 8px 0 10px;
      max-height: 240px;
      overflow: auto;
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
    }

    .kv-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }

    .kv-key {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.35;
    }

    .hint {
      font-size: 12px;
      color: var(--sub);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>LangGraph Multi-Agent Console</h1>
      <p>运行工作流、查看 checkpoint、处理中断并继续执行。</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>1) 运行任务</h2>
        <div class="row">
          <div>
            <label>Project ID</label>
            <input id="projectId" value="mall-001" placeholder="mall-001" />
          </div>
          <div>
            <label>Raw Requirement</label>
            <textarea id="rawRequirement">开发一个社区电商商城，支持商品浏览、购物车、下单、支付、订单管理和多小区切换。</textarea>
          </div>
        </div>
        <div class="btns">
          <button id="runBtn">执行 /runs</button>
        </div>
      </article>

      <article class="card">
        <h2>2) 状态与历史</h2>
        <div class="btns">
          <button id="stateBtn" class="secondary">刷新 state</button>
          <button id="historyBtn" class="secondary">刷新 history</button>
        </div>
        <pre id="stateSummaryPre">{}</pre>
        <details>
          <summary>展开 state 完整 JSON</summary>
          <pre id="statePre">{}</pre>
        </details>
        <pre id="historySummaryPre">{}</pre>
        <details>
          <summary>展开 history 完整 JSON</summary>
          <pre id="historyPre">{}</pre>
        </details>
      </article>

      <article class="card">
        <h2>3) 人工补充并恢复</h2>
        <div class="btns">
          <button id="loadMissingBtn" class="secondary">从结果载入缺失字段</button>
        </div>
        <div id="missingFieldsWrap" class="kv-wrap">
          <div class="hint">当前没有待补充字段。先执行 /runs 或加载 interrupted 结果。</div>
        </div>
        <div>
          <label>Human Feedback (JSON，可选手动编辑)</label>
          <textarea id="feedbackText">{
  "支付渠道": "MVP只做微信支付，退款原路退回",
  "小区切换规则": "手动选择优先，不支持跨小区混合下单",
  "RBAC": "用户/商家/管理员三角色",
  "部署与监控": "云部署，日志+监控标准化",
  "库存扣减策略": "下单预扣减，超时回滚"
}</textarea>
        </div>
        <div class="btns">
          <button id="resumeBtn" class="warn">执行 /resume</button>
        </div>
      </article>
    </section>

    <section class="card">
      <h2>结果 <span id="statusTag" class="status"></span></h2>
      <pre id="resultSummaryPre">{}</pre>
      <details>
        <summary>展开结果完整 JSON</summary>
        <pre id="resultPre">{}</pre>
      </details>
    </section>
  </div>

  <script>
    (function () {
      let loading = false;
      const $ = (id) => document.getElementById(id);

      const projectId = $("projectId");
      const rawRequirement = $("rawRequirement");
      const feedbackText = $("feedbackText");
      const missingFieldsWrap = $("missingFieldsWrap");
      const resultPre = $("resultPre");
      const resultSummaryPre = $("resultSummaryPre");
      const statePre = $("statePre");
      const stateSummaryPre = $("stateSummaryPre");
      const historyPre = $("historyPre");
      const historySummaryPre = $("historySummaryPre");
      const statusTag = $("statusTag");

      const runBtn = $("runBtn");
      const stateBtn = $("stateBtn");
      const historyBtn = $("historyBtn");
      const resumeBtn = $("resumeBtn");
      const loadMissingBtn = $("loadMissingBtn");
      let currentMissingFields = [];

      function pretty(v) {
        return JSON.stringify(v, null, 2);
      }

      function setLoading(v) {
        loading = v;
        runBtn.disabled = v;
        stateBtn.disabled = v;
        historyBtn.disabled = v;
        resumeBtn.disabled = v;
        loadMissingBtn.disabled = v;
      }

      function setResult(data) {
        resultSummaryPre.textContent = pretty(buildResultSummary(data));
        resultPre.textContent = pretty(data);
        const status = data && data.status ? String(data.status) : "";
        statusTag.textContent = status;
        statusTag.className = "status";
        if (status) statusTag.classList.add(status);
        if (status === "interrupted") {
          const missing = extractMissingFields(data);
          setMissingFields(missing);
        }
      }

      function extractMissingFields(data) {
        if (!data) return [];
        if (Array.isArray(data.interrupts) && data.interrupts.length > 0) {
          const first = data.interrupts[0];
          if (first && Array.isArray(first.missing_info)) {
            return first.missing_info;
          }
        }
        return [];
      }

      function tryParseJson(text) {
        try {
          const parsed = JSON.parse(text);
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function renderMissingFieldRows(fields, currentValues) {
        if (!fields.length) {
          missingFieldsWrap.innerHTML = '<div class="hint">当前没有待补充字段。先执行 /runs 或加载 interrupted 结果。</div>';
          return;
        }
        const rows = fields.map((field, idx) => {
          const safeKey = String(field);
          const value = Object.prototype.hasOwnProperty.call(currentValues, safeKey)
            ? String(currentValues[safeKey] ?? "")
            : "";
          return `
            <div class="kv-row">
              <div class="kv-key">${idx + 1}. ${escapeHtml(safeKey)}</div>
              <textarea data-kv-key="${escapeHtmlAttr(safeKey)}" placeholder="请填写该项补充信息">${escapeHtml(value)}</textarea>
            </div>
          `;
        }).join("");
        missingFieldsWrap.innerHTML = rows;
        const areas = missingFieldsWrap.querySelectorAll("textarea[data-kv-key]");
        areas.forEach((el) => {
          el.addEventListener("input", syncFeedbackJsonFromFields);
        });
      }

      function collectFieldInputs() {
        const out = {};
        const areas = missingFieldsWrap.querySelectorAll("textarea[data-kv-key]");
        areas.forEach((el) => {
          const key = el.getAttribute("data-kv-key");
          const value = (el.value || "").trim();
          if (key && value) out[key] = value;
        });
        return out;
      }

      function setMissingFields(fields) {
        currentMissingFields = Array.isArray(fields) ? fields : [];
        const currentValues = tryParseJson(feedbackText.value);
        renderMissingFieldRows(currentMissingFields, currentValues);
        syncFeedbackJsonFromFields();
      }

      function syncFeedbackJsonFromFields() {
        const mapped = collectFieldInputs();
        if (Object.keys(mapped).length > 0) {
          feedbackText.value = pretty(mapped);
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeHtmlAttr(value) {
        return escapeHtml(value).replaceAll('"', "&quot;");
      }

      function buildResultSummary(data) {
        if (!data) return {};
        const summary = {
          project_id: data.project_id || null,
          status: data.status || null,
        };
        if (data.status === "interrupted") {
          summary.interrupt_count = Array.isArray(data.interrupts) ? data.interrupts.length : 0;
          summary.first_interrupt = Array.isArray(data.interrupts) && data.interrupts.length > 0
            ? data.interrupts[0]
            : null;
        }
        if (data.status === "completed" && data.result) {
          summary.review_passed = data.result.review_report ? data.result.review_report.passed : null;
          summary.task_count = Array.isArray(data.result.task_breakdown) ? data.result.task_breakdown.length : 0;
          summary.prompt_count = Array.isArray(data.result.prompt_pack) ? data.result.prompt_pack.length : 0;
          summary.errors = Array.isArray(data.state && data.state.errors) ? data.state.errors : [];
        }
        if (data.error) {
          summary.error = data.error;
        }
        return summary;
      }

      function buildStateSummary(data) {
        if (!data) return {};
        return {
          project_id: data.project_id || null,
          checkpoint_id: data.checkpoint_id || null,
          next: Array.isArray(data.next) ? data.next : [],
          created_at: data.created_at || null,
          metadata_step: data.metadata && data.metadata.step ? data.metadata.step : null,
          has_values: !!(data.values && Object.keys(data.values).length),
          values_keys: data.values ? Object.keys(data.values) : []
        };
      }

      function buildHistorySummary(data) {
        if (!data) return {};
        const rows = Array.isArray(data.history) ? data.history.slice(0, 5).map((item) => ({
          checkpoint_id: item.checkpoint_id || null,
          created_at: item.created_at || null,
          next: Array.isArray(item.next) ? item.next : [],
          step: item.metadata && item.metadata.step ? item.metadata.step : null
        })) : [];
        return {
          project_id: data.project_id || null,
          count: data.count || 0,
          latest_5: rows
        };
      }

      async function callApi(url, options) {
        const res = await fetch(url, options || {});
        let data = null;
        try {
          data = await res.json();
        } catch (_) {}
        if (!res.ok) {
          throw new Error((data && (data.detail || JSON.stringify(data))) || res.statusText);
        }
        return data;
      }

      async function loadState() {
        const pid = encodeURIComponent(projectId.value.trim());
        const data = await callApi("/runs/" + pid + "/state");
        stateSummaryPre.textContent = pretty(buildStateSummary(data));
        statePre.textContent = pretty(data);
      }

      async function loadHistory() {
        const pid = encodeURIComponent(projectId.value.trim());
        const data = await callApi("/runs/" + pid + "/history?limit=20");
        historySummaryPre.textContent = pretty(buildHistorySummary(data));
        historyPre.textContent = pretty(data);
      }

      runBtn.addEventListener("click", async function () {
        setLoading(true);
        try {
          const data = await callApi("/runs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              project_id: projectId.value.trim(),
              raw_requirement: rawRequirement.value
            })
          });
          setResult(data);
          await loadState();
          await loadHistory();
        } catch (err) {
          setResult({ error: String(err) });
        } finally {
          setLoading(false);
        }
      });

      resumeBtn.addEventListener("click", async function () {
        setLoading(true);
        try {
          const pid = encodeURIComponent(projectId.value.trim());
          const fromFields = collectFieldInputs();
          let parsed = {};
          if (Object.keys(fromFields).length > 0) {
            parsed = fromFields;
          } else {
            parsed = JSON.parse(feedbackText.value);
          }
          const data = await callApi("/runs/" + pid + "/resume", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ human_feedback: parsed })
          });
          setResult(data);
          await loadState();
          await loadHistory();
        } catch (err) {
          setResult({ error: String(err) });
        } finally {
          setLoading(false);
        }
      });

      loadMissingBtn.addEventListener("click", function () {
        const currentResult = tryParseJson(resultPre.textContent);
        const missing = extractMissingFields(currentResult);
        setMissingFields(missing);
      });

      stateBtn.addEventListener("click", async function () {
        setLoading(true);
        try {
          await loadState();
        } catch (err) {
          setResult({ error: String(err) });
        } finally {
          setLoading(false);
        }
      });

      historyBtn.addEventListener("click", async function () {
        setLoading(true);
        try {
          await loadHistory();
        } catch (err) {
          setResult({ error: String(err) });
        } finally {
          setLoading(false);
        }
      });

      loadState().catch(function () {});
      loadHistory().catch(function () {});
    })();
  </script>
</body>
</html>
